<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />

    <title>Business Casual - Start Bootstrap Theme</title>

    <link rel="icon" type="image/x-icon" th:href="@{/assets/favicon.ico}" />

    <!-- Google fonts-->
    <link
      href="https://fonts.googleapis.com/css?family=Raleway:100,100i,200,200i,300,300i,400,400i,500,500i,600,600i,700,700i,800,800i,900,900i"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css?family=Lora:400,400i,700,700i"
      rel="stylesheet"
    />

    <!-- Core theme CSS -->
    <link th:href="@{/css/styles.css}" rel="stylesheet" />
  </head>

  <body>
    <!-- HEADER (réutilisable) -->
    <div th:replace="fragments/header :: header"></div>

    <!-- ===================== CONTENT ===================== -->

    <section class="page-section clearfix">
      <div class="container">
        <div class="intro">
          <img
            class="intro-img img-fluid mb-3 mb-lg-0 rounded"
            th:src="@{/assets/img/intro.jpg}"
            alt="..."
          />

          <div class="intro-text left-0 text-center bg-faded p-5 rounded">
            <h2 class="section-heading mb-4">
              <span class="section-heading-upper">Fresh Coffee</span>
              <span class="section-heading-lower">Worth Drinking</span>
            </h2>

            <p class="mb-3">
              Every cup of our quality artisan coffee starts with locally
              sourced ingredients...
            </p>

            <div class="intro-button mx-auto">
              <a class="btn btn-primary btn-xl" href="#!">Visit Us Today!</a>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="page-section cta">
      <div class="container">
        <div class="row">
          <div class="col-xl-9 mx-auto">
            <div class="cta-inner bg-faded text-center rounded">
              <h2 class="section-heading mb-4">
                <span class="section-heading-upper">Our Promise</span>
                <span class="section-heading-lower">To You</span>
              </h2>

              <p class="mb-0">
                When you walk into our shop, we are dedicated to providing you
                with friendly service...
              </p>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- ===================== FOOTER ===================== -->
    <div th:replace="fragments/footer :: footer"></div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Core theme JS -->
    <script th:src="@{/js/scripts.js}"></script>
  </body>
</html>
